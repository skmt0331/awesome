<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Homepage</title>
    <style>
        /* CSSで見た目を整えます */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f9;
        }
        header {
            text-align: center;
            padding: 50px 0;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            color: #e74c3c; /* ご参考の「赤」をアクセントに */
            margin: 0;
        }
        section {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
        .highlight {
            color: #e74c3c;
            font-weight: bold;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8em;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <h1>Hello, World!</h1>
        <p>私のホームページへようこそ</p>
    </header>

    <section>
        <h2>自己紹介</h2>
        <p>こんにちは！これはHTML1枚で作成したシンプルな静的サイトです。</p>
        <p>好きな色は<span class="highlight">レッド</span>です。</p>
    </section>

    <section>
        <h2>趣味</h2>
        <ul>
            <li>プログラミング</li>
            <li>読書</li>
            <li>旅行</li>
        </ul>
    </section>

    <footer>
        <p>&copy; 2026 My Portfolio Site</p>
    </footer>

</body>
</html>
